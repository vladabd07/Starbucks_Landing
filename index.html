<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homepage | Starbucks </title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
   <header class="header">
    <div class="container">
        <a href="#" class="header__logo text-gradient">StarBucks</a>

        <nav class="header__nav">
            <ul class="header__nav-list">

                <li class="header__nav-item">
                    <a href="#" class="header__nav-link">Home</a>
                </li>

                <li class="header__nav-item">
                    <a href="#" class="header__nav-link">Select</a>
                </li>

                <li class="header__nav-item">
                    <a href="#" class="header__nav-link">Shop</a>
                </li>

            </ul>
        </nav>
            </div>
               </header>

        <main class="main">
            <section class="welcome">
                <div class="container">

                <h1 class="title welcome__title ">New Cafe <br> by <span class="text-gradient">StarBucks</span></h1>

                <p class="welcome__text">Have time to buy the most harmonious drinks in the new Starbucks coffee and don't forget about the discount!</p>

                <div class="welcome__btns-wrapper">
                    <a href="#" class="btn">Select a coffee</a>
                    <a href="#" class="link">More</a>
                </div>
                
                <div class="stats">
                    <p class="stats__item">
                        <span class="stats__num">9k</span>
                        Premium
                        Users
                    </p>
                </div>
                <div class="stats">
                    <p class="stats__item">
                        <span class="stats__num">28k</span>
                        Awards
                        Winning
                    </p>
                </div>

                <div class="stats">
                    <p class="stats__item">
                        <span class="stats__num">2k</span>
                        Happy
                        Customers
                    </p>
                </div>
                </div>

                <div class="welcome__img-wrapper">
                    <img class="welcome__img" src="/images/cups/green-big.png" alt="">
                </div>

            </section>
        </main>
</body>
</html>
